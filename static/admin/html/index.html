<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fly Print Edge 管理中心</title>
  <link rel="stylesheet" href="/static/admin/css/admin.css">
</head>
<body>
  <main class="admin-shell">
    <header class="admin-header">
      <div>
        <h1>Fly Print Edge 管理中心</h1>
        <p>统一管理云端配置、打印设置、运行参数与打印机。</p>
      </div>
      <div class="header-actions">
        <button id="configSaveBtn" type="button" class="btn btn-primary">保存配置</button>
        <button id="cloudCheckRegisterBtn" type="button" class="btn">检测连接并注册节点</button>
      </div>
    </header>

    <section class="admin-toolbar">
      <span id="configStatusText" class="status-pill">配置状态: 未加载</span>
      <span id="cloudStatusText" class="status-pill">云端状态: 加载中...</span>
      <span id="restartHintText" class="status-pill is-hidden">部分配置需重启 Edge 后生效</span>
    </section>

    <section id="errorBox" class="error-box is-hidden"></section>
    <section id="resultBox" class="result-box is-hidden"></section>

    <section class="admin-layout">
      <nav class="admin-nav">
        <button type="button" class="nav-item is-active" data-section="overview">概览</button>
        <button type="button" class="nav-item" data-section="cloud">云端配置</button>
        <button type="button" class="nav-item" data-section="settings">打印默认设置</button>
        <button type="button" class="nav-item" data-section="runtime">运行设置</button>
        <button type="button" class="nav-item" data-section="discovery">打印机发现</button>
        <button type="button" class="nav-item" data-section="printers">打印机管理</button>
      </nav>

      <section id="configPanel" class="admin-panel"></section>
    </section>
  </main>

  <script src="/static/admin/main.js" defer></script>
</body>
</html>
