<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>飞印终端应用管理中心</title>
  <link rel="stylesheet" href="/static/admin/css/admin.css">
</head>
<body>
  <section id="adminToast" class="admin-toast is-hidden" aria-live="polite"></section>
  <section id="adminLoadingOverlay" class="admin-loading-overlay is-hidden" aria-live="polite">
    <div class="admin-loading-overlay__card">
      <div class="admin-loading-spinner" aria-hidden="true"></div>
      <p data-role="loading-text">加载中...</p>
    </div>
  </section>

  <main class="admin-shell">
    <header class="admin-header">
      <div>
        <h1>飞印终端应用管理中心</h1>
      </div>
      <div class="header-actions">
        <button id="configSaveBtn" type="button" class="btn btn-primary">保存配置</button>
        <button id="cloudCheckRegisterBtn" type="button" class="btn">激活终端</button>
      </div>
    </header>

    <section class="admin-toolbar">
      <span id="configStatusText" class="status-pill">配置状态: 未加载</span>
      <span id="cloudStatusText" class="status-pill">云端状态: 加载中...</span>
      <span id="restartHintText" class="status-pill is-hidden">部分配置需重启 Edge 后生效</span>
    </section>

    <section class="admin-layout">
      <nav class="admin-nav">
        <button type="button" class="nav-item is-active" data-section="cloud">云端连接</button>
        <button type="button" class="nav-item" data-section="settings">打印设置</button>
        <button type="button" class="nav-item" data-section="runtime">应用设置</button>
        <button type="button" class="nav-item" data-section="printers">打印机管理</button>
      </nav>

      <section id="configPanel" class="admin-panel"></section>
    </section>
  </main>

  <script src="/static/admin/main.js" type="module"></script>
</body>
</html>
